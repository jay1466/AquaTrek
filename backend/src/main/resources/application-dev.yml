##############################################################
# AquaTrack — Development Profile Configuration
# Activated by: SPRING_PROFILES_ACTIVE=dev
##############################################################

spring:
  jpa:
    show-sql: true           # Show SQL in console during development
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

  # Use a local in-memory H2 for test isolation, or connect to local Postgres
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aquatrack_db}
    username: ${DB_USERNAME:aquatrack_user}
    password: ${DB_PASSWORD:aquatrack_pass}

  mail:
    # MailHog/MailDev for local email testing — no real SMTP needed
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Verbose logging in dev
logging:
  level:
    root: INFO
    com.aquatrack: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.flywaydb: INFO

# Actuator — expose everything in dev
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: DevSecretKeyForAquaTrackLocalOnly-NotForProduction-256Bits!
    access-token-expiry-ms: 3600000      # 1 hour in dev (easier testing)
    refresh-token-expiry-ms: 604800000   # 7 days
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173,http://localhost:4173"
  rate-limit:
    capacity: 1000
    refill-tokens: 1000
    refill-period-seconds: 60
